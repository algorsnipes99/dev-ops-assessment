# ============================================================================
# Fleet Health Monitor — Docker Compose Orchestration
# ============================================================================
services:

  # --------------------------------------------------------------------------
  # PostgreSQL (Alpine image)
  # --------------------------------------------------------------------------
  database:
    image: postgres:16-alpine
    container_name: fleet-database
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-fleet_health}
      POSTGRES_USER: ${DB_USER:-fleet_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fleet_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fleet_user} -d ${DB_NAME:-fleet_health}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # --------------------------------------------------------------------------
  # Node.js Application
  # --------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleet-app
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: database
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-fleet_health}
      DB_USER: ${DB_USER:-fleet_user}
      DB_PASSWORD: ${DB_PASSWORD:-fleet_pass}
      PORT: ${PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      database:
        condition: service_healthy

# ----------------------------------------------------------------------------
# Named volumes
# ----------------------------------------------------------------------------
volumes:
  pgdata:
